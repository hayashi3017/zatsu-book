summary: 造幣局FAQでは、金融機関で回収された記念貨幣は日本銀行を経て造幣局に戻り、素材別に鋳潰して新たに発行する貨幣の材料に使うとしている。
claim: 金融機関で回収された記念貨幣は、鋳潰されて新しい貨幣の材料として再利用される。
