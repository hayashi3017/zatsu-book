summary: 造幣局Q&Aでは、金本位制の廃止により金貨を製造する必要がなくなり、日本では1932年を最後に通常貨幣としての金貨製造がなくなったと説明している。
claim: 通常貨幣としての金貨は、金本位制の廃止後に製造されなくなった。
