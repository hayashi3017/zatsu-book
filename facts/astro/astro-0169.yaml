summary: 国立天文台FAQでは、たとえば前日23時30分の月の出が翌日は50分遅れて24時20分になると、その『翌日』には月の出がなく欄が空欄になると説明している。
claim: 月の出や月の入りがない日があるのは、次の時刻が日付をまたいで翌々日にずれ込むことがあるからである。
