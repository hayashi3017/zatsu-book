summary: Museum of Scienceによると、液体窒素が対象から熱を奪って沸騰し、泡立ちが止まる頃には対象物は液体窒素と同じ温度まで冷えている。
claim: 液体窒素の沸騰が止まる頃、浸した物体はほぼ液体窒素と同じ温度になっている。
