id: science-0031
title: ボイジャーのカメラは“壊れていなくても”簡単には再起動できない
genres:
- 科学
- 天文
- 宇宙探査
tags:
- ボイジャー
- カメラ
- ソフトウェア
summary: NASAは、ボイジャーのカメラ制御ソフトが機体から外され、地上側でそれを扱う計算機環境も残っていないため、再起動は優先されないとしている。
claim: ボイジャーのカメラは、ハードだけでなく運用ソフト環境の消失もあって簡単には再起動できない。
sources:
