id: weather-0133
title: 雲が白く見えるのは雲粒が光の波長と同程度で特定の色だけを強く散乱しないからである
genres:
- 気象
- 雲
tags:
- 気象庁
- 散乱
summary: 気象庁FAQでは、雲粒の大きさは光の波長と同程度で散乱の強さが波長によらないため、特定の色だけが強く散乱されず雲は白く見えるとしている。
claim: 雲が白いのは、雲粒が光の波長と同程度で、色によらずほぼ同じように光を散乱するからである。
