summary: 気象庁FAQでは、梅雨は雨や曇りの日が現れる現象・期間を指すため、梅雨前線が原因でない雨でも雨が続くなら梅雨明けにならないとしている。
claim: 梅雨前線の雨でなくても、雨が続けば『梅雨明け』とならないことがある。
