id: weather-0111
title: 気象情報で降水量を『ミリ』と呼ぶのは気象庁が意図的に省略している表現である
genres:
- 気象
- 言葉
tags:
- 気象庁
- 単位
summary: 気象庁FAQでは、統計資料ではmmを使う一方、一般向け気象情報では社会一般での使われ方や字数制限を考慮し『ミリメートル』を『ミリ』と省略している。
claim: 気象庁が降水量を『ミリ』と表現するのは、一般向けの情報で意図的に『ミリメートル』を省略しているためである。
