id: weather-0131
title: 空が青く見えるのは波長の短い光が強く散乱されるからである
genres:
- 気象
- 空
tags:
- 気象庁
- 散乱
summary: 気象庁FAQでは、晴天時には空気分子によって波長の短い光ほど強く散乱され、地上には青色の光が相対的に多く届くため空が青く見えると説明している。
claim: 空が青いのは、太陽光のうち波長の短い光が大気で強く散乱されるからである。
