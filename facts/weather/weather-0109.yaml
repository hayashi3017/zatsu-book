summary: 気象庁FAQでは、降水量100ミリは『降った雨がそのままたまると水深10センチ』を意味し、1平方メートルでは100リットルに相当すると説明している。
claim: 1時間100ミリの雨は、水深10センチ、1平方メートルあたり100リットルの水量に相当する。
