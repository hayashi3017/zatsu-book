summary: 気象庁FAQでは、集中豪雨は活発な積乱雲によって起き、暖かく湿った下層空気と冷たく乾いた上層空気が重なる不安定な大気状態が共通条件だとしている。
claim: 集中豪雨は、暖湿な下層空気と冷乾な上層空気で大気が不安定になったときの活発な積乱雲がもたらす。
