summary: 気象庁FAQでは、小笠原諸島には5月中旬から6月上旬頃に降水が増え日照が減る時期があるが、期間が短く毎年現れる現象でもないため季節現象としての梅雨とは扱っていない。
claim: 小笠原諸島には雨の増える時期があるが、気象庁は梅雨入り・梅雨明けを発表していない。
