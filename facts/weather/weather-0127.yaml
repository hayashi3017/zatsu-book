summary: 気象庁FAQでは、不快指数は気温と湿度から求める蒸し暑さの指数だが、風速などの条件でも体感は変わるため、気象庁の統計種目にはしていないとしている。
claim: 不快指数は知られた指標だが、気象庁の統計種目ではない。
