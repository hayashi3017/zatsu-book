id: weather-0128
title: 気象庁は湿度の予報を出していない
genres:
- 気象
- 湿度
tags:
- 気象庁
- 予報
summary: 気象庁FAQでは、湿度は場所による偏りが大きく、家の内外や草地・池・風向きなど周囲条件でも大きく変わるため、予報値の利用が難しいとして湿度予報は行っていない。
claim: 気象庁は、湿度の地域差や局所差が大きいため湿度予報をしていない。
