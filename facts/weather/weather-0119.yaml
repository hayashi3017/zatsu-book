summary: 気象庁キッズFAQでは、雪になるかは上空気温・地上気温・湿度で決まり、上空1500メートル付近の気温がマイナス3℃以下だと雪で降ることが多いとしている。
claim: 上空1500メートル付近がマイナス3℃以下だと、雨ではなく雪で降ることが多い。
