id: weather-0132
title: 夕焼けが赤いのは大気を長く通る間に青い光が散乱され赤い光が届きやすくなるからである
genres:
- 気象
- 空
tags:
- 気象庁
- 夕焼け
summary: 気象庁FAQでは、夕方は太陽光が大気を通る距離が長く、波長の短い光が途中で散乱され、波長の長い赤色の光が多く地上に届くため夕焼けが赤く見えるとしている。
claim: 夕焼けが赤いのは、太陽光が長い大気の道のりを通る間に青い光が散乱され、赤い光が届きやすくなるからである。
