summary: 2010年メタ解析では、子どもの筋力向上は年齢や成熟段階とともに伸びやすくなるが、思春期に明瞭な跳ね上がりは見られないとされた。
claim: 子どもの筋トレ効果は年齢で高まりやすいが、思春期だけ特別に急上昇するとは限らない。
sources:
