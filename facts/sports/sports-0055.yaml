summary: 失敗反復メタ解析では、失敗まで行う方が有利に見える場面はあるが、総ボリュームをそろえると筋肥大差は見えにくくなった。
claim: 筋肥大では「限界まで」が絶対条件というより、総ボリュームの影響が大きい。
