id: sports-0058
title: 筋肉痛は、筋肥大の必須条件ではない
genres:
- スポーツ
- 筋トレ
- 運動科学
tags:
- 筋肉痛
- 筋肥大
- 筋損傷
summary: 筋損傷と筋肥大のレビューでは、運動誘発性筋損傷に伴う炎症や痛みが長期の筋肥大に必須だとは支持されていない。
claim: 筋肉痛が強いほど筋肥大する、とは言い切れない。
sources:
