summary: 高負荷と低負荷を比べた系統的レビューでは、筋肥大は広い負荷帯で起こる一方、最大筋力は重い負荷の方が伸びやすい。
claim: 筋肥大だけを見るなら軽い重量でも起こり得るが、1RMの伸びは重い重量の方が有利である。
