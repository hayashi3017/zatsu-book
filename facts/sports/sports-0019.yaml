summary: 同じ2025年メタ解析では、VO2maxやTT改善には介入期間の長さが関係した一方、週ボリュームや総ボリュームは有意に結びつかなかった。
claim: 自転車の伸びは「もっと乗る」より「適切な期間続ける」の方が説明力を持つ場合がある。
