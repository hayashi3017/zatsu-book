summary: 頻度メタ解析では、見かけ上は週あたり頻度が多いほど筋力向上は大きいが、総ボリュームをそろえると差は有意でなくなった。
claim: 筋トレ頻度は大事だが、筋力差のかなりの部分は「頻度そのもの」より総ボリュームで説明できる。
