summary: 成長・成熟と安全性を扱ったレビューでは、適切に監督された子どものレジスタンストレーニングが成長や成熟を妨げる証拠は乏しいと整理されている。
claim: 子どもの筋トレは、正しく行えば「身長が止まる」とは言いにくい。
