summary: スミソニアン国立動物園は、フラミンゴの羽のピンク色は藻やブラインシュリンプ由来のカロテノイド色素を代謝して生じると説明している。
claim: フラミンゴの羽がピンクになるのは、食べ物の色素を体内で代謝するからである。
