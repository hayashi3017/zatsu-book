name: Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Pages Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2

      - name: Install mdBook
        run: cargo install mdbook --version 0.4.37 --locked

      - name: Validate facts
        run: cargo run -p factctl -- validate

      - name: Detect duplicates
        run: cargo run -p factctl -- dedupe --fail-on-high-confidence-duplicate

      - name: Build pages
        run: cargo run -p factctl -- build-pages

      - name: Ensure generated files are committed
        run: ./scripts/check-generated.sh

      - name: Build mdBook
        run: mdbook build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./book/html

  deploy:
    name: Deploy Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
