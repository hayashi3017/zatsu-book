name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  content:
    name: content
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2

      - name: Install mdBook
        run: cargo install mdbook --version 0.4.37 --locked

      - name: Validate facts
        run: cargo run -p factctl -- validate

      - name: Detect duplicates
        run: cargo run -p factctl -- dedupe --fail-on-high-confidence-duplicate

      - name: Build pages
        run: cargo run -p factctl -- build-pages

      - name: Ensure generated files are committed
        run: ./scripts/check-generated.sh

      - name: Build mdBook
        run: mdbook build
